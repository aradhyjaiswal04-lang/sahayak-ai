<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahayak AI - Home</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#38bdf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --accent: #38bdf8;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* Glassmorphism Card */
        .container { 
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px; 
            width: 100%;
            max-width: 420px; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 20px;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-box { text-align: center; margin-bottom: 15px; }
        .logo-box img { 
            width: 90px; height: 90px; 
            border-radius: 24px; 
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            transition: 0.5s;
        }
        .logo-box img:hover { transform: rotate(5deg) scale(1.05); }
        
        h2 { 
            text-align: center; 
            font-weight: 800; 
            letter-spacing: -1px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            background-clip: text; 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #38bdf8; 
            margin-bottom: 30px; 
        }

        .lang-toggle { 
            position: absolute;
            top: 20px;
            right: 20px;
        }

        #langSelect {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #38bdf8;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .input-group {
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Staggered animation for inputs */
        .input-group:nth-child(1) { animation-delay: 0.2s; }
        .input-group:nth-child(2) { animation-delay: 0.3s; }
        .input-group:nth-child(3) { animation-delay: 0.4s; }
        .input-group:nth-child(4) { animation-delay: 0.5s; }

        select, input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 14px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15, 23, 42, 0.6); 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, select:focus { 
            border-color: var(--accent); 
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        label { font-size: 0.8em; color: #94a3b8; margin-top: 12px; margin-left: 5px; display: block; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: 25px; 
            background: linear-gradient(135deg, #6366f1, #38bdf8); 
            border: none; 
            border-radius: 16px; 
            color: white; 
            font-weight: 800; 
            font-size: 1.1rem;
            cursor: pointer; 
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 25px -5px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body>

<div class="lang-toggle">
    <select id="langSelect" onchange="changeLanguage()">
        <option value="en">EN</option>
        <option value="hi">हिन्दी</option>
        <option value="mr">मराठी</option>
    </select>
</div>

<div class="container">
    <div class="logo-box">
        <img src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/90/38bdf8/ffffff?text=AI'">
    </div>
    
    <h2 id="ui-title">Sahayak AI</h2>

    <form id="form">
        <div class="input-group">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="number" id="age" placeholder="Age" required min="1" max="100">
        </div>
        
        <div class="input-group">
            <label id="ui-gen-lab">Gender</label>
            <select id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="any">Other</option>
            </select>
        </div>

        <div class="input-group">
            <label id="ui-caste-lab">Caste Category</label>
            <select id="caste">
                <option value="any">General</option>
                <option value="obc">OBC</option>
                <option value="sc">SC</option>
                <option value="st">ST</option>
            </select>
        </div>

        <div class="input-group">
            <input type="number" id="income" placeholder="Annual Income" required>
            <input type="text" id="occupation" placeholder="Occupation (e.g. farmer, student)" required>
            <input type="text" id="education" placeholder="Education (e.g. 10th, Graduate)">
        </div>
        
        <button type="submit" id="ui-btn">Find Schemes</button>
    </form>
</div>

<script src='https://www.noupe.com/embed/019d36025d177e088cc9e712fa2b88785d76.js'></script>

<script>
const translations = {
    en: { title: "Sahayak AI", name: "Full Name", age: "Age", gen: "Gender", caste: "Caste Category", income: "Annual Income", occ: "Occupation", edu: "Education", btn: "Find Schemes" },
    hi: { title: "सहायक AI", name: "पूरा नाम", age: "उम्र", gen: "लिंग", caste: "जाति श्रेणी", income: "वार्षिक आय", occ: "पेशा", edu: "शिक्षा", btn: "योजनाएँ खोजें" },
    mr: { title: "सहायक AI", name: "पूर्ण नाव", age: "वय", gen: "लिंग", caste: "जात प्रवर्ग", income: "वार्षिक उत्पन्न", occ: "व्यवसाय", edu: "शिक्षण", btn: "योजना शोधा" }
};

function changeLanguage() {
    const lang = document.getElementById("langSelect").value;
    const t = translations[lang];

    document.getElementById("ui-title").innerText = t.title;
    document.getElementById("ui-gen-lab").innerText = t.gen;
    document.getElementById("ui-caste-lab").innerText = t.caste;
    document.getElementById("ui-btn").innerText = t.btn;
    
    document.getElementById("name").placeholder = t.name;
    document.getElementById("age").placeholder = t.age; 
    document.getElementById("income").placeholder = t.income;
    document.getElementById("occupation").placeholder = t.occ;
    document.getElementById("education").placeholder = t.edu;
}

document.getElementById("form").addEventListener("submit", (e) => {
    e.preventDefault();
    const data = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        gender: document.getElementById("gender").value,
        caste: document.getElementById("caste").value,
        income: document.getElementById("income").value,
        occupation: document.getElementById("occupation").value,
        education: document.getElementById("education").value,
        lang: document.getElementById("langSelect").value
    };
    localStorage.setItem("userData", JSON.stringify(data));
    window.location.href = "results.html";
});

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Sahayak Ready'))
            .catch(err => console.log('PWA Failed', err));
    });
}
</script>
</body>
</html>
