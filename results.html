    <style>
        :root {
            --primary: #6366f1;
            --accent: #38bdf8;
            --success: #10b981;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body { 
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white; 
            font-family: 'Inter', sans-serif; 
            padding: 20px; 
            margin: 0; 
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding-bottom: 100px; }
        .header-nav { display: flex; justify-content: flex-start; align-items: center; margin: 20px 0; }

        .btn-back { 
            background: rgba(255, 255, 255, 0.05); 
            color: var(--accent); 
            text-decoration: none; 
            padding: 10px 20px; 
            border-radius: 14px; 
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s; 
        }

        #res-title {
            font-size: 2.2rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            background-clip: text; 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            font-weight: 800;
            margin: 20px 0 40px 0;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; }

        .card { 
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 25px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            flex-direction: column; 
            opacity: 0;
            animation: fadeInCard 0.6s ease forwards;
        }

        @keyframes fadeInCard { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card:hover { transform: translateY(-8px); border-color: var(--accent); }
        .card h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 1.4rem; font-weight: 700; }
        .benefit-tag { color: var(--success); font-weight: 800; font-size: 1.2rem; margin: 10px 0; display: block; }
        .explanation { font-size: 0.95em; color: #cbd5e1; font-style: italic; border-left: 4px solid var(--accent); padding-left: 12px; margin: 15px 0; }
        .docs { background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 16px; font-size: 0.85em; margin-bottom: 20px; flex-grow: 1; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-action { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .btn-apply { grid-column: span 2; background: linear-gradient(135deg, #6366f1, #38bdf8); color: white; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 800; }
    </style>
</head>

                "min_age": 0, "max_age": 100, "gender": "female", "caste": "any", "occupation": "any", "max_income": 10000000, "documents": ["Aadhar", "PAN Card"], "link": "https://www.indiapost.gov.in/" 
            },
            { 
                "en": { "name": "Deendayal Antyodaya (DAY)", "benefit": "SHG Support", "explanation": "Livelihood for poor." },
                "hi": { "name": "दीनदयाल अंत्योदय (DAY)", "benefit": "SHG सहायता", "explanation": "गरीबों के लिए आजीविका।" },
                "mr": { "name": "दीनदयाळ अंत्योदय (DAY)", "benefit": "SHG मदत", "explanation": "गरिबांसाठी उपजीविका।" },
                "min_age": 18, "max_age": 60, "max_income": 100000, "gender": "any", "caste": "any", "occupation": "any", "documents": ["BPL Cert", "Aadhar"], "link": "https://aajeevika.gov.in/" 
            },
            { 
                "en": { "name": "Vidyalakshmi Loan", "benefit": "Education Loan", "explanation": "Single portal for loans." },
                "hi": { "name": "विद्यालक्ष्मी ऋण", "benefit": "शिक्षा ऋण", "explanation": "ऋण के लिए एकल पोर्टल।" },
                "mr": { "name": "विद्यालक्ष्मी कर्ज", "benefit": "शिक्षण कर्ज", "explanation": "कर्जासाठी एकल पोर्टल।" },
                "min_age": 17, "max_age": 35, "max_income": 10000000, "gender": "any", "caste": "any", "occupation": "student", "documents": ["Admission Proof", "PAN"], "link": "https://www.vidyalakshmi.co.in/" 
            },
            { 
                "en": { "name": "PM Swasthya Suraksha", "benefit": "Tertiary Healthcare", "explanation": "Better hospital treatment." },
                "hi": { "name": "पीएम स्वास्थ्य सुरक्षा", "benefit": "तृतीयक स्वास्थ्य सेवा", "explanation": "बेहतर अस्पताल उपचार।" },
                "mr": { "name": "पीएम स्वास्थ्य सुरक्षा", "benefit": "तृतीयक आरोग्य सेवा", "explanation": "चांगले रुग्णालय उपचार।" },
                "min_age": 0, "max_age": 100, "max_income": 10000000, "gender": "any", "caste": "any", "occupation": "any", "documents": ["Aadhar"], "link": "https://pmssy-mohfw.nic.in/" 
            }
        ];

        function speakText(text, lang) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang === 'hi' ? 'hi-IN' : (lang === 'mr' ? 'mr-IN' : 'en-US');
            window.speechSynthesis.speak(msg);
        }

        function shareScheme(name, link) {
            const message = `*Sahayak AI* \n\n*Scheme:* ${name}\n*Apply:* ${link}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function loadResults() {
            const userData = JSON.parse(localStorage.getItem("userData"));
            if (!userData) { window.location.href = "index.html"; return; }

            const lang = userData.lang || 'en';
            document.getElementById("res-title").innerText = langPack[lang].title;

            const matched = allSchemes.filter(s => {
                const age = parseInt(userData.age);
                const income = parseInt(userData.income);
                const occInput = userData.occupation.toLowerCase();
                const userCaste = userData.caste.toLowerCase();

                return age >= s.min_age && age <= s.max_age &&
                       income <= s.max_income &&
                       (s.gender === "any" || s.gender.toLowerCase() === userData.gender.toLowerCase()) &&
                       (s.caste === "any" || s.caste.toLowerCase() === userCaste) &&
                       (s.occupation === "any" || occInput.includes(s.occupation.toLowerCase()));
            });

            const outputDiv = document.getElementById("output");
            if (matched.length === 0) {
                outputDiv.innerHTML = `<div class="no-results"><h3>${langPack[lang].none}</h3></div>`;
            } else {
                outputDiv.innerHTML = `<div class="grid">` + matched.map((s, index) => {
                    const info = s[lang] || s['en'];
                    return `
                    <div class="card" style="animation-delay: ${index * 0.1}s">
                        <h3>${info.name}</h3>
                        <span class="benefit-tag">💰 ${info.benefit}</span>
                        <div class="explanation">✨ ${info.explanation}</div>
                        <div class="docs">📄 <b>${langPack[lang].docLab}:</b><br>${s.documents.join(", ")}</div>
                        <div class="actions">
                            <button class="btn-action" onclick="speakText('${info.name}. ${info.benefit}.', '${lang}')">${langPack[lang].speak}</button>
                            <button class="btn-action" onclick="shareScheme('${info.name}', '${s.link}')">${langPack[lang].share}</button>
                            <a href="${s.link}" class="btn-apply" target="_blank">${langPack[lang].btn}</a>
                        </div>
                    </div>`;
                }).join('') + `</div>`;
            }
        }

        window.onload = loadResults;
    </script>
</body>
</html>
